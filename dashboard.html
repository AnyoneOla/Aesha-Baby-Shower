<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Dashboard - Aesha's Baby Shower</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFBFD;
            color: #1f2937;
        }

        .font-serif { 
            font-family: 'Playfair Display', serif; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(147, 112, 219, 0.15);
        }

        .float-1 { animation: float 8s ease-in-out infinite; }
        .float-2 { animation: float 10s ease-in-out infinite reverse; }
        .float-3 { animation: float 12s ease-in-out infinite 2s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }
    </style>
</head>
<body class="relative overflow-hidden selection:bg-purple-300 selection:text-purple-900 min-h-screen">

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="blob bg-purple-300 w-96 h-96 rounded-full top-[-10%] left-[-10%] mix-blend-multiply float-1"></div>
        <div class="blob bg-fuchsia-200 w-[30rem] h-[30rem] rounded-full top-[20%] right-[-10%] mix-blend-multiply float-2"></div>
        <div class="blob bg-indigo-200 w-80 h-80 rounded-full bottom-[-10%] left-[20%] mix-blend-multiply float-3"></div>
    </div>

    <div class="relative z-10 overflow-y-auto h-screen p-6">
        
        <div class="max-w-6xl mx-auto pt-10 pb-20">
            <div class="text-center mb-12">
                <h1 class="font-serif text-4xl md:text-5xl text-purple-950 mb-4">RSVP Dashboard</h1>
                <p class="text-purple-700/80 uppercase tracking-widest text-sm font-bold">Aesha's Baby Shower</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-12">
                <div class="glass-panel rounded-2xl p-6 text-center border-b-4 border-b-purple-400">
                    <p class="text-[10px] font-bold text-purple-900 uppercase tracking-wider mb-2">Total Guests</p>
                    <p id="stat-total-guests" class="font-serif text-3xl md:text-4xl text-purple-950">0</p>
                </div>
                <div class="glass-panel rounded-2xl p-6 text-center border-b-4 border-b-blue-400">
                    <p class="text-[10px] font-bold text-purple-900 uppercase tracking-wider mb-2">Under 15</p>
                    <p id="stat-under-15" class="font-serif text-3xl md:text-4xl text-purple-950">0</p>
                </div>
                <div class="glass-panel rounded-2xl p-6 text-center border-b-4 border-b-indigo-400">
                    <p class="text-[10px] font-bold text-purple-900 uppercase tracking-wider mb-2">Above 15</p>
                    <p id="stat-above-15" class="font-serif text-3xl md:text-4xl text-purple-950">0</p>
                </div>
                <div class="glass-panel rounded-2xl p-6 text-center border-b-4 border-b-gray-300">
                    <p class="text-[10px] font-bold text-purple-900 uppercase tracking-wider mb-2">Declined</p>
                    <p id="stat-declined" class="font-serif text-3xl md:text-4xl text-purple-950">0</p>
                </div>
            </div>

            <div id="loading-state" class="text-center py-20">
                <svg class="animate-spin h-10 w-10 text-purple-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-purple-800 font-medium">Loading responses...</p>
            </div>

            <div id="rsvp-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3ewm9Si9J7F_YlMxODvD7-SPFksbQ8ug",
            authDomain: "ayesha-baby-shower.firebaseapp.com",
            projectId: "ayesha-baby-shower",
            storageBucket: "ayesha-baby-shower.firebasestorage.app",
            messagingSenderId: "937921896629",
            appId: "1:937921896629:web:de3720c7e8c768dfcf9efc",
            measurementId: "G-8F9WSD2WY3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();

            const grid = document.getElementById('rsvp-grid');
            const loading = document.getElementById('loading-state');
            
            try {
                const q = query(collection(db, "rsvps"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                let totalUnder15 = 0;
                let totalAbove15 = 0;
                let totalDeclined = 0;
                let htmlContent = '';

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const isAttending = data.attending === 'yes';
                    
                    // Fallback to 0 if fields don't exist yet
                    const u15 = parseInt(data.peopleUnder15 || 0);
                    const a15 = parseInt(data.peopleAbove15 || 0);
                    const guestTotal = u15 + a15;

                    if (isAttending) {
                        totalUnder15 += u15;
                        totalAbove15 += a15;
                    } else {
                        totalDeclined++;
                    }

                    let dateStr = "Recently";
                    if (data.timestamp) {
                        dateStr = data.timestamp.toDate().toLocaleDateString('en-US', { 
                            month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' 
                        });
                    }

                    // Build Card HTML
                    htmlContent += `
                        <div class="glass-panel rounded-2xl p-6 relative flex flex-col transition-all hover:shadow-2xl hover:bg-white/60">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex-1">
                                    <h3 class="font-serif text-xl text-purple-950 truncate pr-2">${data.name}</h3>
                                    <p class="text-xs text-purple-500 truncate">${data.email}</p>
                                </div>
                                ${isAttending 
                                    ? '<span class="shrink-0 inline-flex items-center gap-1 px-2 py-1 rounded-md bg-green-100 text-green-700 text-[10px] font-bold uppercase"><i data-lucide="check" class="w-3 h-3"></i> Yes</span>'
                                    : '<span class="shrink-0 inline-flex items-center gap-1 px-2 py-1 rounded-md bg-gray-200 text-gray-700 text-[10px] font-bold uppercase"><i data-lucide="x" class="w-3 h-3"></i> No</span>'
                                }
                            </div>
                            
                            ${isAttending ? `
                                <div class="grid grid-cols-3 gap-2 mb-4">
                                    <div class="bg-purple-50 rounded-lg p-2 text-center border border-purple-100">
                                        <p class="text-[9px] uppercase font-bold text-purple-400">Total</p>
                                        <p class="font-bold text-purple-900">${guestTotal}</p>
                                    </div>
                                    <div class="bg-blue-50 rounded-lg p-2 text-center border border-blue-100">
                                        <p class="text-[9px] uppercase font-bold text-blue-400">< 15</p>
                                        <p class="font-bold text-blue-900">${u15}</p>
                                    </div>
                                    <div class="bg-indigo-50 rounded-lg p-2 text-center border border-indigo-100">
                                        <p class="text-[9px] uppercase font-bold text-indigo-400">> 15</p>
                                        <p class="font-bold text-indigo-900">${a15}</p>
                                    </div>
                                </div>
                            ` : `
                                <div class="py-4 text-center text-gray-400 italic text-sm border-y border-gray-100 mb-4">
                                    Will not be attending
                                </div>
                            `}
                            
                            ${data.message ? `
                                <div class="bg-white/40 rounded-xl p-3 mb-4 border border-purple-50 flex-grow">
                                    <p class="text-sm text-purple-800 italic leading-relaxed">"${data.message}"</p>
                                </div>
                            ` : '<div class="flex-grow"></div>'}
                            
                            <div class="pt-4 border-t border-purple-100/50 flex justify-between items-center">
                                <p class="text-[10px] text-purple-300 font-medium uppercase tracking-widest">${dateStr}</p>
                                <i data-lucide="baby" class="w-4 h-4 text-purple-200"></i>
                            </div>
                        </div>
                    `;
                });

                // Update Top Stats
                document.getElementById('stat-total-guests').innerText = totalUnder15 + totalAbove15;
                document.getElementById('stat-under-15').innerText = totalUnder15;
                document.getElementById('stat-above-15').innerText = totalAbove15;
                document.getElementById('stat-declined').innerText = totalDeclined;

                // Render
                grid.innerHTML = htmlContent;
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
                lucide.createIcons();

            } catch (error) {
                console.error("Error fetching RSVPs:", error);
                loading.innerHTML = `<p class="text-red-500 font-semibold">Error loading data.</p>`;
            }
        });
    </script>
</body>
</html>
