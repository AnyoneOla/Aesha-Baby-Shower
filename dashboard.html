<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Dashboard - Aesha's Baby Shower</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFBFD;
            color: #1f2937;
        }

        .font-serif { 
            font-family: 'Playfair Display', serif; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(147, 112, 219, 0.15);
        }

        /* Floating Animations for Background Blobs */
        .float-1 { animation: float 8s ease-in-out infinite; }
        .float-2 { animation: float 10s ease-in-out infinite reverse; }
        .float-3 { animation: float 12s ease-in-out infinite 2s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }
    </style>
</head>
<body class="relative overflow-hidden selection:bg-purple-300 selection:text-purple-900 min-h-screen">

    <!-- Animated Background Blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="blob bg-purple-300 w-96 h-96 rounded-full top-[-10%] left-[-10%] mix-blend-multiply float-1"></div>
        <div class="blob bg-fuchsia-200 w-[30rem] h-[30rem] rounded-full top-[20%] right-[-10%] mix-blend-multiply float-2"></div>
        <div class="blob bg-indigo-200 w-80 h-80 rounded-full bottom-[-10%] left-[20%] mix-blend-multiply float-3"></div>
    </div>

    <div class="relative z-10 overflow-y-auto h-screen p-6">
        
        <div class="max-w-6xl mx-auto pt-10 pb-20">
            <!-- Header -->
            <div class="text-center mb-12">
                <h1 class="font-serif text-4xl md:text-5xl text-purple-950 mb-4">RSVP Dashboard</h1>
                <p class="text-purple-700/80">Aesha's Baby Shower</p>
            </div>

            <!-- Stats Overview -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="glass-panel rounded-2xl p-6 text-center">
                    <i data-lucide="users" class="w-8 h-8 mx-auto text-purple-600 mb-2"></i>
                    <p class="text-sm font-semibold text-purple-900 uppercase tracking-wider">Total Responses</p>
                    <p id="stat-total" class="font-serif text-4xl text-purple-950 mt-2">-</p>
                </div>
                <div class="glass-panel rounded-2xl p-6 text-center border-b-4 border-b-green-400">
                    <i data-lucide="check-circle" class="w-8 h-8 mx-auto text-green-500 mb-2"></i>
                    <p class="text-sm font-semibold text-purple-900 uppercase tracking-wider">Attending</p>
                    <p id="stat-attending" class="font-serif text-4xl text-purple-950 mt-2">-</p>
                </div>
                <div class="glass-panel rounded-2xl p-6 text-center border-b-4 border-b-gray-400">
                    <i data-lucide="x-circle" class="w-8 h-8 mx-auto text-gray-500 mb-2"></i>
                    <p class="text-sm font-semibold text-purple-900 uppercase tracking-wider">Declined</p>
                    <p id="stat-declined" class="font-serif text-4xl text-purple-950 mt-2">-</p>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="text-center py-20">
                <svg class="animate-spin h-10 w-10 text-purple-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-purple-800 font-medium">Loading responses...</p>
            </div>

            <!-- RSVP Grid -->
            <div id="rsvp-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
                <!-- Cards will be injected here via JS -->
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyD3ewm9Si9J7F_YlMxODvD7-SPFksbQ8ug",
            authDomain: "ayesha-baby-shower.firebaseapp.com",
            projectId: "ayesha-baby-shower",
            storageBucket: "ayesha-baby-shower.firebasestorage.app",
            messagingSenderId: "937921896629",
            appId: "1:937921896629:web:de3720c7e8c768dfcf9efc",
            measurementId: "G-8F9WSD2WY3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();

            const grid = document.getElementById('rsvp-grid');
            const loading = document.getElementById('loading-state');
            
            try {
                // Fetch data, ordered by timestamp (newest first)
                const q = query(collection(db, "rsvps"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                let attendingCount = 0;
                let declinedCount = 0;
                let htmlContent = '';

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const isAttending = data.attending === 'yes';
                    
                    if (isAttending) attendingCount++;
                    else declinedCount++;

                    // Format date safely
                    let dateStr = "Unknown Date";
                    if (data.timestamp) {
                        dateStr = data.timestamp.toDate().toLocaleDateString('en-US', { 
                            month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' 
                        });
                    }

                    // Build Card HTML
                    htmlContent += `
                        <div class="glass-panel rounded-2xl p-6 relative overflow-hidden transition-transform hover:-translate-y-1">
                            <div class="absolute top-0 right-0 p-4">
                                ${isAttending 
                                    ? '<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-green-100 text-green-700 text-xs font-bold"><i data-lucide="check" class="w-3 h-3"></i> Attending</span>'
                                    : '<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-gray-200 text-gray-700 text-xs font-bold"><i data-lucide="x" class="w-3 h-3"></i> Declined</span>'
                                }
                            </div>
                            
                            <h3 class="font-serif text-xl text-purple-950 pr-24 truncate">${data.name}</h3>
                            <a href="mailto:${data.email}" class="text-sm text-purple-600 hover:text-purple-800 mb-4 block truncate">${data.email}</a>
                            
                            ${data.message ? `
                                <div class="bg-white/40 rounded-lg p-3 mt-4 border border-purple-100">
                                    <p class="text-sm text-purple-800 italic">"${data.message}"</p>
                                </div>
                            ` : ''}
                            
                            <p class="text-xs text-purple-400 mt-4">${dateStr}</p>
                        </div>
                    `;
                });

                // Update Stats
                document.getElementById('stat-total').innerText = querySnapshot.size;
                document.getElementById('stat-attending').innerText = attendingCount;
                document.getElementById('stat-declined').innerText = declinedCount;

                // Render Cards
                grid.innerHTML = htmlContent;
                
                // Hide loading, show grid
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
                
                // Re-initialize icons for newly injected HTML
                lucide.createIcons();

            } catch (error) {
                console.error("Error fetching RSVPs:", error);
                loading.innerHTML = `<p class="text-red-500 font-semibold">Error loading data. Check console or security rules.</p>`;
            }
        });
    </script>
</body>
</html>
